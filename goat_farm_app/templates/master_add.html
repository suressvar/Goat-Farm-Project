{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success mb-0"><i class="bi bi-file-earmark-plus"></i> Add Master Record</h2>
            <a href="{{ url_for('master') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Register</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4 mb-5">
            <div class="card-body p-4 p-md-5">
                <form method="POST" action="{{ url_for('master_add') }}">
                    
                    <!-- Section 1: Core ID -->
                    <h5 class="text-success border-bottom pb-2 mb-3">1. Identification & Status</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-2"><label class="form-label text-muted">SI No</label><input type="text" class="form-control" name="si_no" value="{{ next_sr }}"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Tag No *</label><input type="text" class="form-control border-success" name="tag_no" required></div>
                        <div class="col-md-3"><label class="form-label text-muted">Breed</label><input type="text" class="form-control" name="breed"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Breed %</label><input type="text" class="form-control" name="breed_percent"></div>
                        
                        <div class="col-md-4">
                            <label class="form-label text-muted">Status</label>
                            <select class="form-select" name="status">
                                <option value="Active">Active</option>
                                <option value="Sold">Sold</option>
                                <option value="Expired">Expired</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted">Gender</label>
                            <select class="form-select" name="gender">
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="col-md-4"><label class="form-label text-muted">Color</label><input type="text" class="form-control" name="color"></div>
                    </div>

                    <!-- Section 2: Financial & Physical -->
                    <h5 class="text-success border-bottom pb-2 mb-3">2. Purchase & Insurance Details</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Date of Purchase</label><input type="date" class="form-control" name="purchase_date"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Weight (KG)</label><input type="number" step="0.01" class="form-control" name="weight_kg"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Purchase Amount (₹)</label><input type="number" step="0.01" class="form-control" name="purchase_amount"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Insurance Date</label><input type="date" class="form-control" name="insurance_date"></div>
                    </div>

                    <!-- Section 3: Medical -->
                    <h5 class="text-success border-bottom pb-2 mb-3">3. Medical & Feed</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Vaccination</label><input type="text" class="form-control" name="vaccination"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Vac. Period</label><input type="text" class="form-control" name="vaccination_period"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Medicine</label><input type="text" class="form-control" name="medicine"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Med. Period</label><input type="text" class="form-control" name="medicine_period"></div>
                        <div class="col-md-6"><label class="form-label text-muted">Feed Type</label><input type="text" class="form-control" name="feed"></div>
                        <div class="col-md-6"><label class="form-label text-muted">Feed Amount</label><input type="text" class="form-control" name="feed_amount"></div>
                    </div>

                    <!-- Section 4: Breeding -->
                    <h5 class="text-success border-bottom pb-2 mb-3">4. Breeding (Mating & Delivery)</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Mating Date</label><input type="date" class="form-control" name="mating_date"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Mate Goat No</label><input type="text" class="form-control" name="mating_goat_no"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Goat Week/Period</label><input type="text" class="form-control" name="goat_week_period"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Delivery/Birth Date</label><input type="date" class="form-control" name="delivery_date"></div>
                        <div class="col-md-4"><label class="form-label text-muted">New Goat Gender</label><input type="text" class="form-control" name="new_goat_gender"></div>
                        <div class="col-md-4"><label class="form-label text-muted">New Goat Color</label><input type="text" class="form-control" name="new_goat_color"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Birth Weight (KG)</label><input type="number" step="0.01" class="form-control" name="birth_weight"></div>
                    </div>

                    <!-- Section 5: Exit (Sales / Mortality) -->
                    <h5 class="text-success border-bottom pb-2 mb-3">5. End of Lifecycle (Sale or Mortality)</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><label class="form-label text-muted">Selling Date</label><input type="date" class="form-control" name="selling_date"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Selling Weight</label><input type="number" step="0.01" class="form-control" name="selling_weight"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Selling Price (₹)</label><input type="number" step="0.01" class="form-control" name="selling_price"></div>
                        
                        <div class="col-12 mt-3 mb-2"><strong class="text-danger small text-uppercase block">OR Mortality Stats</strong></div>
                        
                        <div class="col-md-4"><label class="form-label text-muted">Mortality Date</label><input type="date" class="form-control" name="mortality_date"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Mortality Weight</label><input type="number" step="0.01" class="form-control" name="mortality_weight"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Reason</label><input type="text" class="form-control" name="mortality_reason"></div>
                        
                        <div class="col-md-4"><label class="form-label text-muted">Insurance Inform Date</label><input type="date" class="form-control" name="insurance_inform_date"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Insurance Claim Date</label><input type="date" class="form-control" name="insurance_claim_date"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Claim Amount (₹)</label><input type="number" step="0.01" class="form-control" name="insurance_claim_amount"></div>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">Save Complete Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
