{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-5">
                <h3 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="bi bi-pencil-square text-warning"></i> Edit Purchase Record</h3>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Seller Name</label>
                            <input type="text" name="seller_name" class="form-control" value="{{ record['seller_name'] or '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Invoice Details</label>
                            <input type="text" name="invoice_details" class="form-control" value="{{ record['invoice_details'] or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Date of Purchase</label>
                            <input type="date" name="purchase_date" class="form-control" value="{{ record['purchase_date'] or '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Goat Tag ID</label>
                            <input type="text" name="tag_id" class="form-control" value="{{ record['tag_id'] or '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Price (₹)</label>
                            <input type="number" step="0.01" name="price" class="form-control" value="{{ record['price'] or '' }}" required>
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                        <a href="{{ url_for('purchases') }}" class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
                        <div class="gap-2 d-flex">
                            <button type="submit" class="btn btn-warning px-4 rounded-pill fw-bold"><i class="bi bi-check-lg"></i> Update Record</button>
                            <button type="button" class="btn btn-danger px-4 rounded-pill" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i> Delete</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this purchase record? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form method="POST" action="{{ url_for('purchase_delete', id=record['id']) }}" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
