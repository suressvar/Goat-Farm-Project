{% extends 'layout.html' %}

{% block page_title %}Purchase Goat{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Purchase Goat</h2>
    <p class="text-muted mb-0">Record a new goat purchase. It will be automatically added to the Master Records.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('purchase_goat') }}" class="row g-4">
            
            <h5 class="text-success fw-bold border-bottom pb-2 mb-3">Supplier & Invoice Details</h5>
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">SELLER / SUPPLIER NAME <span class="text-danger">*</span></label>
                <input type="text" name="seller_name" class="form-control" required placeholder="e.g. John Doe Farms">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">PURCHASE DATE <span class="text-danger">*</span></label>
                <input type="date" name="purchase_date" class="form-control" required id="todayDate">
            </div>

            <div class="col-md-12">
                <label class="form-label fw-bold small text-muted">INVOICE DETAILS / REF NO</label>
                <input type="text" name="invoice_details" class="form-control" placeholder="Optional invoice number or description">
            </div>

            <h5 class="text-success fw-bold border-bottom pb-2 mt-5 mb-3">Goat Details</h5>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">TAG NUMBER <span class="text-danger">*</span></label>
                <input type="text" name="tag_id" class="form-control" required placeholder="Assign new Tag ID">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">BREED</label>
                <input type="text" name="breed" class="form-control" placeholder="e.g. Boer">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">GENDER</label>
                <select name="gender" class="form-select">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">WEIGHT (KG)</label>
                <input type="number" step="0.01" name="weight" class="form-control" placeholder="0.00">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">PURCHASE PRICE (₹) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="price" class="form-control" required placeholder="0.00">
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-success px-5 py-2 fw-bold">Record Goat Purchase</button>
                <a href="{{ url_for('purchases') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('todayDate').valueAsDate = new Date();
</script>
{% endblock %}
