{% extends 'layout.html' %}

{% block page_title %}Add Feed Record{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Add Daily Feed Record</h2>
    <p class="text-muted mb-0">Record daily consumption, wastage, or miscellaneous feed adjustments.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('feed_add') }}" class="row g-4">
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">FEED NAME <span class="text-danger">*</span></label>
                <input type="text" name="feed_name" class="form-control" required placeholder="e.g. Alfalfa Hay, Corn">
                <div class="form-text text-success"><i class="bi bi-info-circle me-1"></i>Opening stock will be auto-fetched from previous records.</div>
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">RECORD DATE <span class="text-danger">*</span></label>
                <input type="date" name="date" class="form-control" required id="todayDate">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">OVERRIDE OPENING QTY</label>
                <input type="number" step="0.01" name="opening_qty" class="form-control" placeholder="Leave blank to auto-fetch">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">PURCHASE QTY</label>
                <input type="number" step="0.01" name="purchase_qty" class="form-control" placeholder="0.00">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">GROWING/HARVEST QTY</label>
                <input type="number" step="0.01" name="growing_qty" class="form-control" placeholder="0.00">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">CONSUMPTION QTY</label>
                <input type="number" step="0.01" name="consumption_qty" class="form-control" placeholder="0.00">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">WASTAGE QTY</label>
                <input type="number" step="0.01" name="wastage_qty" class="form-control" placeholder="0.00">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">PURCHASE AMOUNT (₹)</label>
                <input type="number" step="0.01" name="purchase_amount" class="form-control" placeholder="0.00">
            </div>
            
            <div class="col-12 mt-4 border-top pt-4">
                <button type="submit" class="btn btn-success px-5 py-2 fw-bold">Save Record & Auto-calculate</button>
                <a href="{{ url_for('feed') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('todayDate').valueAsDate = new Date();
</script>
{% endblock %}
