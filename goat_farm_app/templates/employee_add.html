{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-user-plus"></i> Add New Employee</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('employee_add') }}" novalidate>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="employee_id">Employee ID <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="employee_id" name="employee_id" required placeholder="e.g., EMP001">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="name">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" required placeholder="Enter full name">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="phone">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter phone number">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="role">Role <span class="text-danger">*</span></label>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="">Select Role</option>
                                    <option value="Manager">Manager</option>
                                    <option value="Veterinarian">Veterinarian</option>
                                    <option value="Handler">Handler</option>
                                    <option value="Cleaner">Cleaner</option>
                                    <option value="Feeder">Feeder</option>
                                    <option value="Laborer">Laborer</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="joining_date">Joining Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="joining_date" name="joining_date" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="shift_timing">Shift Timing</label>
                                <select class="form-select" id="shift_timing" name="shift_timing">
                                    <option value="">Select Shift</option>
                                    <option value="Morning (6 AM - 2 PM)">Morning (6 AM - 2 PM)</option>
                                    <option value="Afternoon (2 PM - 10 PM)">Afternoon (2 PM - 10 PM)</option>
                                    <option value="Night (10 PM - 6 AM)">Night (10 PM - 6 AM)</option>
                                    <option value="Flexible">Flexible</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="address">Address</label>
                            <textarea class="form-control" id="address" name="address" rows="3" placeholder="Enter residential address"></textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                            <a href="{{ url_for('employees') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Add Employee
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
