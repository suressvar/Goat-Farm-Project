{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4 class="mb-0"><i class="fas fa-user-edit"></i> Edit Employee</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('employee_edit', emp_id=record.id) }}" novalidate>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label" for="name">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ record.name }}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="phone">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" value="{{ record.phone or '' }}" placeholder="Enter phone number">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="role">Role</label>
                                <select class="form-select" id="role" name="role">
                                    <option value="">Select Role</option>
                                    <option value="Manager" {% if record.role == 'Manager' %}selected{% endif %}>Manager</option>
                                    <option value="Veterinarian" {% if record.role == 'Veterinarian' %}selected{% endif %}>Veterinarian</option>
                                    <option value="Handler" {% if record.role == 'Handler' %}selected{% endif %}>Handler</option>
                                    <option value="Cleaner" {% if record.role == 'Cleaner' %}selected{% endif %}>Cleaner</option>
                                    <option value="Feeder" {% if record.role == 'Feeder' %}selected{% endif %}>Feeder</option>
                                    <option value="Laborer" {% if record.role == 'Laborer' %}selected{% endif %}>Laborer</option>
                                    <option value="Other" {% if record.role == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="joining_date">Joining Date</label>
                                <input type="date" class="form-control" id="joining_date" name="joining_date" value="{{ record.join_date }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label" for="wage_type">Wage Type</label>
                                <select class="form-select" id="wage_type" name="wage_type">
                                    <option value="Daily" {% if record.wage_type == 'Daily' %}selected{% endif %}>Daily</option>
                                    <option value="Weekly" {% if record.wage_type == 'Weekly' %}selected{% endif %}>Weekly</option>
                                    <option value="Monthly" {% if record.wage_type == 'Monthly' %}selected{% endif %}>Monthly</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label" for="wage_rate">Wage Rate (₹)</label>
                                <input type="number" step="0.01" class="form-control" id="wage_rate" name="wage_rate" value="{{ record.wage_rate }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="address">Address</label>
                            <textarea class="form-control" id="address" name="address" rows="3">{{ record.address or '' }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Aadhar Number</label>
                                <input type="text" name="aadhar_no" class="form-control" value="{{ record.aadhar_no or '' }}" placeholder="12-digit Aadhar No">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">PAN Number</label>
                                <input type="text" name="pan_no" class="form-control" value="{{ record.pan_no or '' }}" placeholder="ABCDE1234F">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Bank Name</label>
                                <input type="text" name="bank_name" class="form-control" value="{{ record.bank_name or '' }}" placeholder="e.g. SBI, HDFC">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Account Number</label>
                                <input type="text" name="account_no" class="form-control" value="{{ record.account_no or '' }}" placeholder="Bank Account No">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">IFSC Code</label>
                                <input type="text" name="ifsc_code" class="form-control" value="{{ record.ifsc_code or '' }}" placeholder="SBIN0001234">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label" for="status">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option value="Active" {% if record.status == 'Active' %}selected{% endif %}>Active</option>
                                    <option value="Inactive" {% if record.status == 'Inactive' %}selected{% endif %}>Inactive</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="notes">Notes</label>
                                <input type="text" class="form-control" id="notes" name="notes" value="{{ record.notes or '' }}">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                            <a href="{{ url_for('employees') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Back
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Employee
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
