{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4 class="mb-0"><i class="fas fa-user-edit"></i> Edit Employee</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('employee_edit', emp_id=employee.id) }}" novalidate>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Employee ID</label>
                                <input type="text" class="form-control" value="{{ employee.employee_id }}" disabled>
                                <small class="text-muted">Employee ID cannot be changed</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" value="{{ employee.name }}" disabled>
                                <small class="text-muted">Name cannot be changed</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="phone">Phone Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" value="{{ employee.phone or '' }}" placeholder="Enter phone number">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="role">Role</label>
                                <select class="form-select" id="role" name="role">
                                    <option value="">Select Role</option>
                                    <option value="Manager" {% if employee.role == 'Manager' %}selected{% endif %}>Manager</option>
                                    <option value="Veterinarian" {% if employee.role == 'Veterinarian' %}selected{% endif %}>Veterinarian</option>
                                    <option value="Handler" {% if employee.role == 'Handler' %}selected{% endif %}>Handler</option>
                                    <option value="Cleaner" {% if employee.role == 'Cleaner' %}selected{% endif %}>Cleaner</option>
                                    <option value="Feeder" {% if employee.role == 'Feeder' %}selected{% endif %}>Feeder</option>
                                    <option value="Laborer" {% if employee.role == 'Laborer' %}selected{% endif %}>Laborer</option>
                                    <option value="Other" {% if employee.role == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Joining Date</label>
                                <input type="date" class="form-control" value="{{ employee.joining_date }}" disabled>
                                <small class="text-muted">Joining date cannot be changed</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" for="shift_timing">Shift Timing</label>
                                <select class="form-select" id="shift_timing" name="shift_timing">
                                    <option value="">Select Shift</option>
                                    <option value="Morning (6 AM - 2 PM)" {% if employee.shift_timing == 'Morning (6 AM - 2 PM)' %}selected{% endif %}>Morning (6 AM - 2 PM)</option>
                                    <option value="Afternoon (2 PM - 10 PM)" {% if employee.shift_timing == 'Afternoon (2 PM - 10 PM)' %}selected{% endif %}>Afternoon (2 PM - 10 PM)</option>
                                    <option value="Night (10 PM - 6 AM)" {% if employee.shift_timing == 'Night (10 PM - 6 AM)' %}selected{% endif %}>Night (10 PM - 6 AM)</option>
                                    <option value="Flexible" {% if employee.shift_timing == 'Flexible' %}selected{% endif %}>Flexible</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="address">Address</label>
                            <textarea class="form-control" id="address" name="address" rows="3" placeholder="Enter residential address">{{ employee.address or '' }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="status">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="Active" {% if employee.status == 'Active' %}selected{% endif %}>Active</option>
                                <option value="Inactive" {% if employee.status == 'Inactive' %}selected{% endif %}>Inactive</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                            <a href="{{ url_for('employee_detail', emp_id=employee.id) }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Back
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Employee
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
