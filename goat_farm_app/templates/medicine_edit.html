{% extends 'layout.html' %}

{% block page_title %}Edit Medicine Record{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Edit Medicine Record</h2>
    <p class="text-muted mb-0">Update the details of an existing medicine record.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('medicine_edit', id=record.id) }}" class="row g-4">
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">GOAT TAG NUMBER <span class="text-danger">*</span></label>
                <input type="text" name="tag_no" class="form-control" list="goatTags" required value="{{ record.tag_no }}">
                <datalist id="goatTags">
                    {% for goat in goats %}
                    <option value="{{ goat.tag_no }}">
                    {% endfor %}
                </datalist>
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">CONSULTATION DATE <span class="text-danger">*</span></label>
                <input type="date" name="consultation_date" class="form-control" required value="{{ record.consultation_date }}">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">DOCTOR NAME</label>
                <input type="text" name="doctor_name" class="form-control" list="doctorNames" value="{{ record.doctor_name }}">
                <datalist id="doctorNames">
                    {% for doc in doctors %}
                    <option value="{{ doc.doctor_name }}">
                    {% endfor %}
                </datalist>
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">MEDICINE NAME <span class="text-danger">*</span></label>
                <input type="text" name="medicine_name" class="form-control" required value="{{ record.medicine_name }}">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">DOSE</label>
                <input type="text" name="dose" class="form-control" value="{{ record.dose }}">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">QUANTITY GIVEN</label>
                <input type="text" name="quantity" class="form-control" value="{{ record.quantity }}">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">COST (₹) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="cost" class="form-control" required value="{{ record.cost }}">
            </div>
            
            <div class="col-12">
                <label class="form-label fw-bold small text-muted">NOTES / OBSERVATIONS</label>
                <textarea name="notes" class="form-control" rows="3">{{ record.notes }}</textarea>
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">Update Record</button>
                <a href="{{ url_for('medicine') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
