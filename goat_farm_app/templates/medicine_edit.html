{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-warning mb-0"><i class="bi bi-pencil-square"></i> Edit Medicine/Vaccine Log</h2>
            <a href="{{ url_for('medicine') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Logs</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    
                    <h5 class="text-warning mb-3 border-bottom pb-2">Goat Identification</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-2"><label class="form-label text-muted">Sr#</label><input type="text" class="form-control" name="sr_no" value="{{ record['sr_no'] or '' }}"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Tag No *</label><input type="text" class="form-control border-warning" name="tag_no" value="{{ record['tag_no'] or '' }}" required></div>
                        <div class="col-md-3"><label class="form-label text-muted">Breed</label><input type="text" class="form-control" name="breed" value="{{ record['breed'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Breed %</label><input type="text" class="form-control" name="breed_percent" value="{{ record['breed_percent'] or '' }}"></div>
                    </div>

                    <h5 class="text-warning mb-3 border-bottom pb-2">Medical Round 1</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Med 1 Date</label><input type="date" class="form-control" name="med1_date" value="{{ record['med1_date'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Med 1 Name</label><input type="text" class="form-control" name="med1_name" value="{{ record['med1_name'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Vac 1 Date</label><input type="date" class="form-control" name="vac1_date" value="{{ record['vac1_date'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Vac 1 Name</label><input type="text" class="form-control" name="vac1_name" value="{{ record['vac1_name'] or '' }}"></div>
                    </div>

                    <h5 class="text-warning mb-3 border-bottom pb-2">Medical Round 2 & 3</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Med 2 Date</label><input type="date" class="form-control" name="med2_date" value="{{ record['med2_date'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Med 2 Name</label><input type="text" class="form-control" name="med2_name" value="{{ record['med2_name'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Med 3 Date</label><input type="date" class="form-control" name="med3_date" value="{{ record['med3_date'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Med 3 Name</label><input type="text" class="form-control" name="med3_name" value="{{ record['med3_name'] or '' }}"></div>
                    </div>
                    
                    <h5 class="text-warning mb-3 border-bottom pb-2">Additional Vaccine & Costs</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Vac 2 Date</label><input type="date" class="form-control" name="vac2_date" value="{{ record['vac2_date'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Vac 2 Name</label><input type="text" class="form-control" name="vac2_name" value="{{ record['vac2_name'] or '' }}"></div>
                        <div class="col-md-3">
                            <label class="form-label text-muted">Medicine Amt</label>
                            <div class="input-group"><span class="input-group-text">₹</span><input type="number" step="0.01" class="form-control" name="medicine_amount" value="{{ record['medicine_amount'] or '' }}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-muted">Vaccine Amt</label>
                            <div class="input-group"><span class="input-group-text">₹</span><input type="number" step="0.01" class="form-control" name="vaccine_amount" value="{{ record['vaccine_amount'] or '' }}"></div>
                        </div>
                    </div>
                    
                    <div class="col-12 mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning btn-lg flex-grow-1 shadow-sm">Update Record</button>
                        <button type="button" class="btn btn-danger btn-lg" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i> Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this medicine record? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form method="POST" action="{{ url_for('medicine_delete', id=record['id']) }}" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
