{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-5">
                <h3 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="bi bi-cart-plus text-success"></i> Add New Purchase</h3>
                <form method="POST" action="{{ url_for('purchase_add') }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Seller Name</label>
                            <input type="text" name="seller_name" class="form-control bg-light" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Invoice Details</label>
                            <input type="text" name="invoice_details" class="form-control bg-light">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Date of Purchase</label>
                            <input type="date" name="purchase_date" class="form-control bg-light" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Goat Tag ID</label>
                            <input type="text" name="tag_id" class="form-control bg-light" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Price (₹)</label>
                            <input type="number" step="0.01" name="price" class="form-control bg-light" required>
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-3 border-top d-flex justify-content-between">
                        <a href="{{ url_for('purchases') }}" class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
                        <button type="submit" class="btn btn-success px-4 rounded-pill fw-bold"><i class="bi bi-check-lg"></i> Save Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
