{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-10 col-lg-11">
        <div class="card rounded-4 shadow-sm border-0">
            <div class="card-body p-5">
                <h3 class="mb-4">Add Equipment</h3>
                <form method="post" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Equipment Name</label>
                            <input type="text" name="equipment_name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select name="category_id" class="form-select">
                                <option value="">Select category</option>
                                {% for c in categories %}
                                <option value="{{ c['id'] }}">{{ c['category_name'] }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Purchase Date</label>
                            <input type="date" name="purchase_date" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Vendor</label>
                            <select name="vendor_id" class="form-select">
                                <option value="">Select supplier</option>
                                {% for s in suppliers %}
                                <option value="{{ s['id'] }}">{{ s['name'] }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Warranty End Date</label>
                            <input type="date" name="warranty_end_date" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Condition Status</label>
                            <select name="condition_status" class="form-select">
                                {% for option in condition_options %}
                                <option value="{{ option }}">{{ option }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Purchase Cost</label>
                            <input type="number" step="0.01" name="purchase_cost" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Repair Cost</label>
                            <input type="number" step="0.01" name="repair_cost" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fuel Cost</label>
                            <input type="number" step="0.01" name="fuel_cost" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Maintenance Cost</label>
                            <input type="number" step="0.01" name="maintenance_cost" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Assigned Employee</label>
                            <select name="assigned_employee_id" class="form-select">
                                <option value="">No assignment</option>
                                {% for e in employees %}
                                <option value="{{ e['id'] }}">{{ e['name'] }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Used Date</label>
                            <input type="date" name="last_used_date" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Usage Hours</label>
                            <input type="number" step="0.1" name="usage_hours" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Service Due Date</label>
                            <input type="date" name="service_due_date" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Depreciation Rate (%)</label>
                            <input type="number" step="0.1" name="depreciation_rate" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Invoice Upload</label>
                            <input type="file" name="invoice_file" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Notes</label>
                            <textarea name="notes" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="mt-4 d-flex justify-content-between">
                        <a href="{{ url_for('equipment') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button class="btn btn-success">Save Equipment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
