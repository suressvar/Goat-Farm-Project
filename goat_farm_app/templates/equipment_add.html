{% extends 'layout.html' %}

{% block page_title %}Add Equipment{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Add Equipment</h2>
    <p class="text-muted mb-0">Record new farm machinery or tools.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('equipment_add') }}" class="row g-4">
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">EQUIPMENT NAME <span class="text-danger">*</span></label>
                <input type="text" name="equipment_name" class="form-control" required placeholder="e.g. Tractor, Milking Machine">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">CONDITION</label>
                <select name="condition_status" class="form-select">
                    <option value="Good">Good</option>
                    <option value="Needs Repair">Needs Repair</option>
                    <option value="Out of Service">Out of Service</option>
                </select>
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">PURCHASE DATE</label>
                <input type="date" name="purchase_date" class="form-control">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">PURCHASE COST (₹)</label>
                <input type="number" step="0.01" name="purchase_cost" class="form-control" placeholder="0.00">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">NEXT SERVICE DUE DATE</label>
                <input type="date" name="service_due_date" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">ASSIGNED TO</label>
                <input type="text" name="assigned_employee" class="form-control" placeholder="Employee Name">
            </div>
            
            <div class="col-12">
                <label class="form-label fw-bold small text-muted">NOTES</label>
                <textarea name="notes" class="form-control" rows="3" placeholder="Model number, warranty details, etc."></textarea>
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-success px-5 py-2 fw-bold">Save Equipment</button>
                <a href="{{ url_for('equipment') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
