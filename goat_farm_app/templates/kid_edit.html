{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-warning mb-0"><i class="bi bi-pencil-square"></i> Edit Kid Details</h2>
            <a href="{{ url_for('kid') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Kids Web</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    
                    <h5 class="text-warning mb-3 border-bottom pb-2">Primary Identification</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">S.NO</label><input type="text" class="form-control" name="s_no" value="{{ record['s_no'] or '' }}"></div>
                        <div class="col-md-9"><label class="form-label text-muted">Kid ID *</label><input type="text" class="form-control border-warning" name="kid_id" value="{{ record['kid_id'] or '' }}" required></div>
                    </div>

                    <h5 class="text-warning mb-3 border-bottom pb-2">Parentage</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6"><label class="form-label text-muted">Mother Tag ID</label><input type="text" class="form-control border-info" name="mother_id" value="{{ record['mother_id'] or '' }}"></div>
                        <div class="col-md-6"><label class="form-label text-muted">Father Tag ID</label><input type="text" class="form-control border-info" name="father_id" value="{{ record['father_id'] or '' }}"></div>
                    </div>

                    <h5 class="text-warning mb-3 border-bottom pb-2">Traits & Origin</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Breed</label><input type="text" class="form-control" name="breed" value="{{ record['breed'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Breed %</label><input type="text" class="form-control" name="breed_percent" value="{{ record['breed_percent'] or '' }}"></div>
                        <div class="col-md-3">
                            <label class="form-label text-muted">Gender</label>
                            <select class="form-select" name="gender">
                                <option value=""></option><option value="M" {% if record['gender'] == 'M' %}selected{% endif %}>Male</option><option value="F" {% if record['gender'] == 'F' %}selected{% endif %}>Female</option>
                            </select>
                        </div>
                        <div class="col-md-3"><label class="form-label text-muted">Color</label><input type="text" class="form-control" name="color" value="{{ record['color'] or '' }}"></div>
                    </div>

                    <h5 class="text-warning mb-3 border-bottom pb-2">Health & Age Information</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Litter Size</label><input type="number" class="form-control" name="litter_size" value="{{ record['litter_size'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Birth Date</label><input type="date" class="form-control" name="birth_date" value="{{ record['birth_date'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Age (Months)</label><input type="text" class="form-control" name="age_month" value="{{ record['age_month'] or '' }}"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Birth Weight (KG)</label><input type="number" step="0.01" class="form-control" name="birth_weight" value="{{ record['birth_weight'] or '' }}"></div>
                    </div>
                    
                    <div class="col-12 mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning btn-lg flex-grow-1 shadow-sm">Update Record</button>
                        <button type="button" class="btn btn-danger btn-lg" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i> Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this kid record? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form method="POST" action="{{ url_for('kid_delete', id=record['id']) }}" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
