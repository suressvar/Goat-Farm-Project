{% extends 'layout.html' %}

{% block page_title %}Add Medicine Record{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Add Medicine Record</h2>
    <p class="text-muted mb-0">Record a new medicine or treatment for a goat.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('medicine_add') }}" class="row g-4">
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">GOAT TAG NUMBER <span class="text-danger">*</span></label>
                <input type="text" name="tag_no" class="form-control" list="goatTags" required placeholder="Select or type tag number">
                <datalist id="goatTags">
                    {% for goat in goats %}
                    <option value="{{ goat.tag_no }}">
                    {% endfor %}
                </datalist>
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">CONSULTATION DATE <span class="text-danger">*</span></label>
                <input type="date" name="consultation_date" class="form-control" required id="todayDate">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">DOCTOR NAME</label>
                <input type="text" name="doctor_name" class="form-control" list="doctorNames" placeholder="Select or type doctor name">
                <datalist id="doctorNames">
                    {% for doc in doctors %}
                    <option value="{{ doc.doctor_name }}">
                    {% endfor %}
                </datalist>
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">MEDICINE NAME <span class="text-danger">*</span></label>
                <input type="text" name="medicine_name" class="form-control" required placeholder="e.g. Antibiotic XYZ">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">DOSE</label>
                <input type="text" name="dose" class="form-control" placeholder="e.g. 5ml, 2 tablets">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">QUANTITY GIVEN</label>
                <input type="text" name="quantity" class="form-control" placeholder="e.g. 1 course, 1 bottle">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">COST (₹) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="cost" class="form-control" required placeholder="0.00">
            </div>
            
            <div class="col-12">
                <label class="form-label fw-bold small text-muted">NOTES / OBSERVATIONS</label>
                <textarea name="notes" class="form-control" rows="3" placeholder="Any special instructions or observations after giving medicine..."></textarea>
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-success px-5 py-2 fw-bold">Save Medicine Record</button>
                <a href="{{ url_for('medicine') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('todayDate').valueAsDate = new Date();
</script>
{% endblock %}
