{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success mb-0"><i class="bi bi-plus-slash-minus"></i> Add Kid Details</h2>
            <a href="{{ url_for('kid') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Kids Web</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="POST" action="{{ url_for('kid_add') }}">
                    
                    <h5 class="text-primary mb-3 border-bottom pb-2">Primary Identification</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">S.NO</label><input type="text" class="form-control" name="s_no"></div>
                        <div class="col-md-9"><label class="form-label text-muted">Kid ID *</label><input type="text" class="form-control border-primary" name="kid_id" required></div>
                    </div>

                    <h5 class="text-primary mb-3 border-bottom pb-2">Parentage</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6"><label class="form-label text-muted">Mother Tag ID</label><input type="text" class="form-control border-info" name="mother_id"></div>
                        <div class="col-md-6"><label class="form-label text-muted">Father Tag ID</label><input type="text" class="form-control border-info" name="father_id"></div>
                    </div>

                    <h5 class="text-primary mb-3 border-bottom pb-2">Traits & Origin</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Breed</label><input type="text" class="form-control" name="breed"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Breed %</label><input type="text" class="form-control" name="breed_percent"></div>
                        <div class="col-md-3">
                            <label class="form-label text-muted">Gender</label>
                            <select class="form-select" name="gender">
                                <option value=""></option><option value="M">Male</option><option value="F">Female</option>
                            </select>
                        </div>
                        <div class="col-md-3"><label class="form-label text-muted">Color</label><input type="text" class="form-control" name="color"></div>
                    </div>

                    <h5 class="text-primary mb-3 border-bottom pb-2">Health & Age Information</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Litter Size</label><input type="number" class="form-control" name="litter_size"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Birth Date</label><input type="date" class="form-control" name="birth_date"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Age-Month</label><input type="text" class="form-control" name="age_month" placeholder="e.g. 2.5"></div>
                        <div class="col-md-3"><label class="form-label text-muted">Birth Weight (KGS)</label><input type="number" step="0.01" class="form-control" name="birth_weight"></div>
                    </div>
                    
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm"><i class="bi bi-save2"></i> Save Kid Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
