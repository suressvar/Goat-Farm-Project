{% extends 'layout.html' %}

{% block page_title %}Purchase Vaccine{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Purchase Vaccine</h2>
    <p class="text-muted mb-0">Record bulk vaccine purchases for the farm.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('purchase_vaccine') }}" class="row g-4">
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">VACCINE NAME <span class="text-danger">*</span></label>
                <input type="text" name="vaccine_name" class="form-control" required placeholder="e.g. FMD Vaccine">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">SUPPLIER NAME</label>
                <input type="text" name="supplier" class="form-control" placeholder="e.g. Vet Supplies Co">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">QUANTITY (Doses/Vials) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="quantity" class="form-control" required placeholder="0.00">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">TOTAL COST (₹) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="cost" class="form-control" required placeholder="0.00">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">PURCHASE DATE <span class="text-danger">*</span></label>
                <input type="date" name="purchase_date" class="form-control" required id="todayDate">
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn text-white px-5 py-2 fw-bold" style="background-color: #7b1fa2;">Record Vaccine Purchase</button>
                <a href="{{ url_for('purchases') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('todayDate').valueAsDate = new Date();
</script>
{% endblock %}
