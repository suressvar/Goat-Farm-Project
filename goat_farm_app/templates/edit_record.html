{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-primary fw-bold mb-0">Edit Financial Record</h2>
                    <a href="{{ url_for('records') }}" class="btn btn-sm btn-outline-secondary">Cancel</a>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted">Tag Number *</label>
                        <input type="text" name="tag_number" class="form-control border-primary" value="{{ record.tag_number }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Date *</label>
                        <input type="date" name="date" class="form-control" value="{{ record.date }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Category *</label>
                        <select name="category" class="form-select border-primary" required>
                            <option value="income" {% if record.category == 'income' %}selected{% endif %}>Income</option>
                            <option value="expense" {% if record.category == 'expense' %}selected{% endif %}>Expense</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Type *</label>
                        <input type="text" name="type" class="form-control" value="{{ record.type }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Amount (₹) *</label>
                        <input type="number" step="0.01" name="amount" class="form-control border-success" value="{{ record.amount }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Notes</label>
                        <textarea name="notes" class="form-control" rows="3">{{ record.notes }}</textarea>
                    </div>
                    <button class="btn btn-primary w-100 btn-lg shadow-sm" type="submit">Update Record</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
