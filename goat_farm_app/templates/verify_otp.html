<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Verify OTP</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h3 class="fw-bold text-center mb-4">Verify OTP</h3>
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endif %}
                {% endwith %}
                <div class="alert alert-info small">Check the backend console for your mock OTP!</div>
                <form method="POST">
                    <div class="mb-4"><label>Enter 6-Digit OTP</label><input type="text" name="otp" class="form-control text-center fs-4" required></div>
                    <button class="btn btn-success w-100" type="submit">Verify & Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
