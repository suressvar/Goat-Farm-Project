<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Register</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h3 class="fw-bold text-center mb-4">Register</h3>
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endif %}
                {% endwith %}
                <form method="POST">
                    <div class="mb-3"><label>Username</label><input type="text" name="username" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <button class="btn btn-primary w-100 mb-3" type="submit">Register</button>
                    <div class="text-center"><a href="{{ url_for('login') }}">Back to Login</a></div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
