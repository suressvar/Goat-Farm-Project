{% extends 'layout.html' %}

{% block page_title %}Edit Vaccine Record{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Edit Vaccine Record</h2>
    <p class="text-muted mb-0">Update the details of an existing vaccination record.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('vaccine_edit', id=record.id) }}" class="row g-4">
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">SERIAL NUMBER</label>
                <input type="text" name="sr_no" class="form-control" value="{{ record.sr_no }}">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">GOAT TAG NUMBER <span class="text-danger">*</span></label>
                <input type="text" name="tag_no" class="form-control" list="goatTags" required value="{{ record.tag_no }}">
                <datalist id="goatTags">
                    {% for goat in goats %}
                    <option value="{{ goat.tag_no }}">
                    {% endfor %}
                </datalist>
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">VACCINE DATE <span class="text-danger">*</span></label>
                <input type="date" name="vaccine_date" class="form-control" required value="{{ record.vaccine_date }}">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">VACCINE NAME <span class="text-danger">*</span></label>
                <input type="text" name="vaccine_name" class="form-control" required value="{{ record.vaccine_name }}">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">COST (₹) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="amount_spent" class="form-control" required value="{{ record.amount_spent }}">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">NEXT DUE DATE</label>
                <input type="date" name="next_due_date" class="form-control" value="{{ record.next_due_date }}">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">ADDITIONAL VACCINES</label>
                <input type="text" name="additional_vaccines" class="form-control" value="{{ record.additional_vaccines }}">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">ADDITIONAL MEDICINES</label>
                <input type="text" name="additional_medicines" class="form-control" value="{{ record.additional_medicines }}">
            </div>
            
            <div class="col-12">
                <label class="form-label fw-bold small text-muted">NOTES / OBSERVATIONS</label>
                <textarea name="notes" class="form-control" rows="3">{{ record.notes }}</textarea>
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">Update Vaccine Record</button>
                <a href="{{ url_for('vaccine') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
