{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-warning mb-0"><i class="bi bi-pencil-square"></i> Edit Feed Inventory Record</h2>
            <a href="{{ url_for('feed') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Inventory</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    
                    <h5 class="text-warning mb-3 border-bottom pb-2">General Details</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">SI No</label><input type="text" class="form-control" name="si_no" value="{{ record['si_no'] or '' }}"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Date *</label><input type="date" class="form-control border-warning" name="date" value="{{ record['date'] or '' }}" required></div>
                        <div class="col-md-5"><label class="form-label text-muted">Feed Name *</label><input type="text" class="form-control border-warning" name="feed_name" value="{{ record['feed_name'] or '' }}" required></div>
                    </div>

                    <h5 class="text-warning mb-3 border-bottom pb-2">Inventory Quantities (KGS)</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><label class="form-label text-muted">Opening Qty</label><input type="number" step="0.01" class="form-control bg-light" name="opening_qty" value="{{ record['opening_qty'] or '' }}"></div>
                        <div class="col-md-4"><label class="form-label text-muted text-warning fw-semibold">Purchase Qty (+)</label><input type="number" step="0.01" class="form-control border-warning" name="purchase_qty" value="{{ record['purchase_qty'] or '' }}"></div>
                        <div class="col-md-4"><label class="form-label text-muted text-success fw-semibold">Growing Qty (+)</label><input type="number" step="0.01" class="form-control border-success" name="growing_qty" value="{{ record['growing_qty'] or '' }}"></div>
                        
                        <div class="col-md-4"><label class="form-label text-muted text-danger fw-semibold">Consumption Qty (-)</label><input type="number" step="0.01" class="form-control border-danger" name="consumption_qty" value="{{ record['consumption_qty'] or '' }}"></div>
                        <div class="col-md-4"><label class="form-label text-muted text-warning fw-semibold">Wastage Qty (-)</label><input type="number" step="0.01" class="form-control border-warning" name="wastage_qty" value="{{ record['wastage_qty'] or '' }}"></div>
                        <div class="col-md-4"><label class="form-label text-dark fw-bold">Closing Stock (=)</label><input type="number" step="0.01" class="form-control border-dark shadow-sm" name="closing_stock" value="{{ record['closing_stock'] or '' }}"></div>
                    </div>

                    <h5 class="text-warning mb-3 border-bottom pb-2">Financials</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted">Purchase Amount</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" class="form-control" name="purchase_amount" value="{{ record['purchase_amount'] or '' }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Consumption Amount</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" class="form-control" name="consumption_amount" value="{{ record['consumption_amount'] or '' }}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-12 mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning btn-lg flex-grow-1 shadow-sm">Update Record</button>
                        <button type="button" class="btn btn-danger btn-lg" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i> Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this feed record? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form method="POST" action="{{ url_for('feed_delete', id=record['id']) }}" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
