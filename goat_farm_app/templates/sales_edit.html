{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-warning mb-0"><i class="bi bi-pencil-square"></i> Edit Sales Record</h2>
            <a href="{{ url_for('sales') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Sales</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    
                    <h5 class="text-warning border-bottom pb-2 mb-3">Goat Details</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><label class="form-label text-muted">Sr#</label><input type="text" class="form-control" name="sr_no" value="{{ record['sr_no'] or '' }}"></div>
                        <div class="col-md-9"><label class="form-label text-muted">Tag ID *</label><input type="text" class="form-control border-warning" name="tag_id" value="{{ record['tag_id'] or '' }}" required></div>
                        <div class="col-md-4"><label class="form-label text-muted">Breed</label><input type="text" class="form-control" name="breed" value="{{ record['breed'] or '' }}"></div>
                        <div class="col-md-4"><label class="form-label text-muted">Breed %</label><input type="text" class="form-control" name="breed_percent" value="{{ record['breed_percent'] or '' }}"></div>
                        <div class="col-md-4">
                            <label class="form-label text-muted">Gender</label>
                            <select class="form-select" name="gender">
                                <option value=""></option>
                                <option value="M" {% if record['gender'] == 'M' %}selected{% endif %}>Male</option>
                                <option value="F" {% if record['gender'] == 'F' %}selected{% endif %}>Female</option>
                            </select>
                        </div>
                    </div>

                    <h5 class="text-warning border-bottom pb-2 mb-3">Transaction Details</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><label class="form-label text-muted">Weight (KG)</label><input type="number" step="0.01" class="form-control" name="weight" value="{{ record['weight'] or '' }}"></div>
                        <div class="col-md-4">
                            <label class="form-label text-muted">Sold Price *</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">₹</span>
                                <input type="number" step="0.01" class="form-control border-warning" name="sold_price" value="{{ record['sold_price'] or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-4"><label class="form-label text-muted">Date of Sale *</label><input type="date" class="form-control" name="date_of_sale" value="{{ record['date_of_sale'] or '' }}" required></div>
                    </div>

                    <h5 class="text-warning border-bottom pb-2 mb-3">Buyer Information</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12"><label class="form-label text-muted">Buyer Name</label><input type="text" class="form-control" name="buyer_name" value="{{ record['buyer_name'] or '' }}"></div>
                        <div class="col-md-6"><label class="form-label text-muted">Buyer City</label><input type="text" class="form-control" name="buyer_city" value="{{ record['buyer_city'] or '' }}"></div>
                        <div class="col-md-6"><label class="form-label text-muted">Contact Details</label><input type="text" class="form-control" name="buyer_contact" placeholder="Phone or email" value="{{ record['buyer_contact'] or '' }}"></div>
                    </div>
                    
                    <div class="col-12 mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-warning btn-lg flex-grow-1 shadow-sm">Update Record</button>
                        <button type="button" class="btn btn-danger btn-lg" data-bs-toggle="modal" data-bs-target="#deleteModal"><i class="bi bi-trash"></i> Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this sales record? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form method="POST" action="{{ url_for('sales_delete', id=record['id']) }}" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
