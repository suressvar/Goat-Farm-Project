{% extends 'layout.html' %}

{% block page_title %}Purchase Feed{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-800 text-dark mb-1">Purchase Feed</h2>
    <p class="text-muted mb-0">Record feed purchases. This will automatically update your feed inventory stock.</p>
</div>

<div class="card border-0">
    <div class="card-body p-4">
        <form method="POST" action="{{ url_for('purchase_feed') }}" class="row g-4">
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">FEED NAME <span class="text-danger">*</span></label>
                <input type="text" name="feed_name" class="form-control" required placeholder="e.g. Alfalfa Hay, Corn">
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">SUPPLIER NAME</label>
                <input type="text" name="supplier" class="form-control" placeholder="e.g. Agro Supplies Inc">
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">QUANTITY <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="quantity" class="form-control" required placeholder="0.00">
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">UNIT <span class="text-danger">*</span></label>
                <select name="unit" class="form-select" required>
                    <option value="KG">KG</option>
                    <option value="Bags">Bags</option>
                    <option value="Tons">Tons</option>
                    <option value="Litres">Litres</option>
                </select>
            </div>
            
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">TOTAL COST (₹) <span class="text-danger">*</span></label>
                <input type="number" step="0.01" name="cost" class="form-control" required placeholder="0.00">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-muted">PURCHASE DATE <span class="text-danger">*</span></label>
                <input type="date" name="purchase_date" class="form-control" required id="todayDate">
            </div>
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-warning text-dark px-5 py-2 fw-bold">Record Feed Purchase</button>
                <a href="{{ url_for('purchases') }}" class="btn btn-light px-4 py-2 ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('todayDate').valueAsDate = new Date();
</script>
{% endblock %}
