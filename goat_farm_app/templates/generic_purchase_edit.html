{% extends 'layout.html' %}

{% block page_title %}Edit Purchase{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success mb-0"><i class="bi bi-pencil-square"></i> Edit Purchase Record</h2>
            <a href="{{ url_for('purchases') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Purchases</a>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4 mb-5">
            <div class="card-body p-4 p-md-5">
                <form method="POST">
                    
                    {% if p_type == 'feed' %}
                        <div class="row g-3 mb-3">
                            <div class="col-md-6"><label class="form-label text-muted">Feed Name *</label><input type="text" class="form-control" name="feed_name" value="{{ record.feed_name }}" required></div>
                            <div class="col-md-3"><label class="form-label text-muted">Quantity *</label><input type="number" step="0.01" class="form-control" name="quantity" value="{{ record.quantity }}" required></div>
                            <div class="col-md-3"><label class="form-label text-muted">Unit</label><input type="text" class="form-control" name="unit" value="{{ record.unit }}"></div>
                        </div>
                    {% elif p_type == 'med' %}
                        <div class="row g-3 mb-3">
                            <div class="col-md-6"><label class="form-label text-muted">Medicine Name *</label><input type="text" class="form-control" name="medicine_name" value="{{ record.medicine_name }}" required></div>
                            <div class="col-md-3"><label class="form-label text-muted">Quantity *</label><input type="number" step="0.01" class="form-control" name="quantity" value="{{ record.quantity }}" required></div>
                            <div class="col-md-3"><label class="form-label text-muted">Dose Unit</label><input type="text" class="form-control" name="dose_unit" value="{{ record.dose_unit }}"></div>
                        </div>
                    {% elif p_type == 'vac' %}
                        <div class="row g-3 mb-3">
                            <div class="col-md-8"><label class="form-label text-muted">Vaccine Name *</label><input type="text" class="form-control" name="vaccine_name" value="{{ record.vaccine_name }}" required></div>
                            <div class="col-md-4"><label class="form-label text-muted">Quantity *</label><input type="number" step="0.01" class="form-control" name="quantity" value="{{ record.quantity }}" required></div>
                        </div>
                    {% endif %}

                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><label class="form-label text-muted">Total Cost (₹) *</label><input type="number" step="0.01" class="form-control" name="cost" value="{{ record.cost }}" required></div>
                        <div class="col-md-4"><label class="form-label text-muted">Purchase Date *</label><input type="date" class="form-control" name="purchase_date" value="{{ record.purchase_date }}" required></div>
                        <div class="col-md-4"><label class="form-label text-muted">Supplier</label><input type="text" class="form-control" name="supplier" value="{{ record.supplier }}"></div>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
